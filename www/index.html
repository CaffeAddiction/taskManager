<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <svg class="titlebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span class="titlebar-title">Task Manager</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn tb-minimize" onclick="api.minimize()">
        <svg viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75"/></svg>
      </button>
      <button class="tb-btn tb-maximize" onclick="api.maximize()">
        <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="tb-btn tb-close" onclick="api.close()">
        <svg viewBox="0 0 12 12">
          <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="app">
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Kategoriler</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Tüm Görevler</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-filter="today">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Bugün</span>
          <span class="nav-count" id="count-today">0</span>
        </button>
        <button class="nav-item" data-filter="important">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>Önemli</span>
          <span class="nav-count" id="count-important">0</span>
        </button>
        <button class="nav-item" data-filter="completed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>Tamamlanan</span>
          <span class="nav-count" id="count-completed">0</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <h3>Etiketler</h3>
        <div class="tags-list">
          <button class="tag-filter" data-tag="is" style="--tag-color: #6c5ce7">
            <span class="tag-dot"></span>İş
          </button>
          <button class="tag-filter" data-tag="kisisel" style="--tag-color: #00b894">
            <span class="tag-dot"></span>Kişisel
          </button>
          <button class="tag-filter" data-tag="alisveris" style="--tag-color: #e17055">
            <span class="tag-dot"></span>Alışveriş
          </button>
          <button class="tag-filter" data-tag="saglik" style="--tag-color: #fd79a8">
            <span class="tag-dot"></span>Sağlık
          </button>
          <button class="tag-filter" data-tag="egitim" style="--tag-color: #0984e3">
            <span class="tag-dot"></span>Eğitim
          </button>
        </div>
      </div>

      <div class="sidebar-stats">
        <div class="stat">
          <span class="stat-number" id="stat-active">0</span>
          <span class="stat-label">Aktif</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="stat-done">0</span>
          <span class="stat-label">Bitti</span>
        </div>
      </div>
    </aside>

    <!-- Main Panel -->
    <main class="main">
      <div class="main-header">
        <div class="header-left">
          <button class="menu-toggle" id="menu-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
          <h1 id="view-title">Tüm Görevler</h1>
          <p class="subtitle" id="view-subtitle">Görevlerini yönet ve organize et</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Görev ara...">
          </div>
        </div>
      </div>

      <!-- Add Task Form -->
      <div class="add-task-area">
        <div class="add-task-form" id="add-task-form">
          <div class="form-row">
            <input type="text" id="task-title" placeholder="Yeni görev ekle..." class="task-input">
            <button class="btn-add" id="btn-add" title="Görev Ekle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div class="form-options" id="form-options">
            <div class="form-option">
              <label>Tarih</label>
              <input type="date" id="task-date">
            </div>
            <div class="form-option">
              <label>Öncelik</label>
              <select id="task-priority">
                <option value="low">Düşük</option>
                <option value="medium" selected>Orta</option>
                <option value="high">Yüksek</option>
              </select>
            </div>
            <div class="form-option">
              <label>Etiket</label>
              <select id="task-tag">
                <option value="">Seçiniz</option>
                <option value="is">İş</option>
                <option value="kisisel">Kişisel</option>
                <option value="alisveris">Alışveriş</option>
                <option value="saglik">Sağlık</option>
                <option value="egitim">Eğitim</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Task List -->
      <div class="task-list" id="task-list">
        <!-- Tasks will be rendered here -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <h3>Görev bulunamadı</h3>
        <p>Yeni bir görev ekleyerek başlayın!</p>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Görevi Düzenle</h2>
        <button class="modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>Başlık</label>
          <input type="text" id="edit-title" class="modal-input">
        </div>
        <div class="form-group">
          <label>Açıklama</label>
          <textarea id="edit-description" class="modal-input" rows="3" placeholder="Açıklama ekle..."></textarea>
        </div>
        <div class="form-row-modal">
          <div class="form-group">
            <label>Tarih</label>
            <input type="date" id="edit-date" class="modal-input">
          </div>
          <div class="form-group">
            <label>Öncelik</label>
            <select id="edit-priority" class="modal-input">
              <option value="low">Düşük</option>
              <option value="medium">Orta</option>
              <option value="high">Yüksek</option>
            </select>
          </div>
          <div class="form-group">
            <label>Etiket</label>
            <select id="edit-tag" class="modal-input">
              <option value="">Seçiniz</option>
              <option value="is">İş</option>
              <option value="kisisel">Kişisel</option>
              <option value="alisveris">Alışveriş</option>
              <option value="saglik">Sağlık</option>
              <option value="egitim">Eğitim</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-cancel">İptal</button>
        <button class="btn-save" id="btn-save">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
